<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajero automatico</title>
    <link rel="stylesheet" href="CajeroAuto.css">
</head>

<body>
    <article class="articleForCajero">
        <section class="Caja">
            <h1>Banco El Costeño</h1>
            <div class="BienVenida">
                <h2>Bienvenido al cajero automatico</h2>
                <p>Seleccione una opción para continuar</p>
            </div>
            <div class="cajero-options">

                <!-- Este es para que fuera un componente -->
                <aside class="Caja-Options">
                    <button id="btn-consultar-saldo">Consultar saldo</button>
                    <button id="btn-retirar-dinero">Retirar dinero</button>
                    <button id="btn-depositar-dinero">Depositar dinero</button>
                    <button id="BtnSalir">Salir</button>
                </aside>
            </div>
        </section>
    </article>
</body>
<script src="Index.js"></script>

</html>
